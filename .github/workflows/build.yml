name: Android AArch64 Native Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build for Android Terminal
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASS: ${{ secrets.OKX_PASS }}
          BN_API_KEY: ${{ secrets.BN_API_KEY }}
          BN_SECRET: ${{ secrets.BN_SECRET }}
        run: cargo ndk -t arm64-v8a build --release

      - name: Generate KernelSU Module
        run: |
          mkdir -p kernelsu_module
          cp target/aarch64-linux-android/release/okx-neutral-bot kernelsu_module/
          
          cat << 'EOF' > kernelsu_module/module.prop
          id=okx_neutral_bot
          name=OKX Neutral Grid Bot
          version=v0.2.0
          versionCode=2
          author=AutoBuild
          description=Runs OKX Neutral Grid Bot in background with Kernel WakeLock.
          EOF
          
          cat << 'EOF' > kernelsu_module/service.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          
          until [ "$(getprop sys.boot_completed)" = "1" ]; do
              sleep 2
          done
          sleep 5
          
          echo "okx_bot_wakelock" > /sys/power/wake_unlock 2>/dev/null
          
          chmod +x $MODDIR/okx-neutral-bot
          nohup $MODDIR/okx-neutral-bot > $MODDIR/bot.log 2>&1 &
          EOF
          
          chmod +x kernelsu_module/service.sh

      - name: Compress Artifacts with 7z
        env:
          ZIP_PASSWORD: ${{ secrets.UPLOAD_PASSWORD }}
        run: |
          # 单文件二进制：进入目录打包避免包含冗长路径，开启文件头和文件名加密(-mhe=on)
          cd target/aarch64-linux-android/release
          7z a -p"$ZIP_PASSWORD" -mhe=on ../../../okx-neutral-bot-aarch64.7z okx-neutral-bot
          cd ../../../
          
          # KernelSU 模块：先打成无密码的标准 zip，再用 7z 加密包裹，解压后即可直接刷入
          cd kernelsu_module
          zip -r ../okx-neutral-bot-kernelsu.zip .
          cd ..
          7z a -p"$ZIP_PASSWORD" -mhe=on okx-neutral-bot-kernelsu.7z okx-neutral-bot-kernelsu.zip

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: okx-neutral-bot-aarch64
          path: okx-neutral-bot-aarch64.7z

      - name: Upload KernelSU Module Artifact
        uses: actions/upload-artifact@v4
        with:
          name: okx-neutral-bot-kernelsu
          path: okx-neutral-bot-kernelsu.7z


